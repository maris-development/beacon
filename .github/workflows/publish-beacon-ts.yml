name: Publish beacon-ts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, e.g. 1.8.0. Leave empty to use the latest v* release tag."
        required: false
        type: string
        default: ""

permissions:
  contents: read

defaults:
  run:
    working-directory: clients/beacon-ts

jobs:
  publish:
    name: Test, build, and publish to npm
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@beacon/client
    permissions:
      contents: read
      id-token: write # provenance attestation
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags, so we can find the latest tag

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Resolve version
        id: version
        env:
          EVENT: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "$EVENT" = "push" ]; then
            version="$REF_NAME"                          # the pushed release tag, e.g. v1.8.0
          elif [ -n "$INPUT_VERSION" ]; then
            version="$INPUT_VERSION"                     # from the manual input
          else
            tag=$(git tag --list 'v*' --sort=-v:refname | head -n1)
            [ -n "$tag" ] || { echo "::error::No v* tags found; provide a version input."; exit 1; }
            version="$tag"                               # latest release tag
          fi
          version="${version#v}"                         # strip the leading 'v' -> X.Y.Z
          [ -n "$version" ] || { echo "::error::Could not resolve a version."; exit 1; }
          echo "Resolved version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set package version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
