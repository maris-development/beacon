[package]
name = "beacon-datalake"
version = "1.8.0"
edition = "2021"

[target.'cfg(not(windows))'.dependencies]
# jemalloc is a production allocator; building its C source costs ~23s. Gate it
# behind a non-default feature so dev/CI builds skip it. Release images enable
# it via `cargo build --release -p beacon-datalake --features jemalloc` (see Dockerfile).
tikv-jemallocator = {workspace = true, optional = true}
pprof = {workspace = true}

[features]
jemalloc = ["dep:tikv-jemallocator"]

[dependencies]
axum = {workspace = true}
axum-streams = {workspace = true}
tower-http = {workspace = true}
base64 = {workspace = true}

futures = { workspace = true }
bytes = { workspace = true }
arrow-flight = { workspace = true, features = ["flight-sql"] }
arrow-ipc = { workspace = true }

utoipa = { workspace = true }
utoipa-axum = { workspace = true }
utoipa-scalar = { workspace = true }
utoipa-swagger-ui = { workspace = true }
tokio = { workspace = true}
tokio-util = { workspace = true}
serde = { workspace = true}
serde_json = { workspace = true}
anyhow = { workspace = true}
arrow = { workspace = true}
arrow-json = "58"
uuid = {workspace = true}
tracing = { workspace = true}
tracing-subscriber = { workspace = true}
tracing-appender = { workspace = true}
tracing-panic = {workspace = true}
tonic = {workspace = true}
prost = {workspace = true}
object_store = { workspace = true }
datafusion = { workspace = true }
thiserror = { workspace = true }
sysinfo = { workspace = true }

# Local dependencies
beacon-datalake-config = { path = "../beacon-datalake-config" }
beacon-core = { path = "../beacon-core" }
beacon-datafusion-ext = { path = "../beacon-datafusion-ext" }
beacon-mcp = { path = "../beacon-mcp" }

[dev-dependencies]
# Tests build runtimes directly via `RuntimeBuilder` (ephemeral temp dirs + an
# in-memory auth provider), so no test-only feature is needed.
beacon-core = { path = "../beacon-core" }
# `tower::ServiceExt::oneshot` for driving the axum router in the HTTP auth tests.
tower = { version = "0.5", features = ["util"] }
# Temp storage roots for the admin dataset file-management HTTP tests.
tempfile = { workspace = true }
