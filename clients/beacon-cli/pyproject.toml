[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "beacon-cli"
version = "0.1.0"
description = "Terminal client for the Beacon data lake: run SQL, explore tables/datasets, render results, and export to CSV/Parquet/Arrow/NetCDF."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Beacon" }]
keywords = ["beacon", "datalake", "sql", "arrow", "cli"]
dependencies = [
    "httpx>=0.27",
    "pyarrow>=14.0",
    "rich>=13.0",
    "prompt_toolkit>=3.0",
    "typer>=0.12",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "respx>=0.21",
    "ruff>=0.6",
]

[project.scripts]
beacon-cli = "beacon_cli.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["beacon_cli"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.flake8-bugbear]
# Typer relies on calling Option()/Argument() in parameter defaults.
extend-immutable-calls = ["typer.Option", "typer.Argument"]

[tool.pytest.ini_options]
testpaths = ["tests"]
