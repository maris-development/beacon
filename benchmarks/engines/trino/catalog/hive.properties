# Trino Hive connector reading local Parquet via the shared Hive Metastore.
# Tables are EXTERNAL with file:// locations under /data (mounted read-only).
connector.name=hive
hive.metastore.uri=thrift://hive-metastore:9083

# Enable the native local/hadoop filesystem so file:/// locations resolve.
fs.hadoop.enabled=true

# Allow creating external tables over an existing directory of files.
hive.non-managed-table-writes-enabled=true

# Parquet read tuning.
hive.parquet.use-column-names=true
