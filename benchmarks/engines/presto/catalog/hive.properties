# Presto Hive connector reading local Parquet via the shared Hive Metastore.
# Mirrors the Trino catalog; tables are EXTERNAL with file:// locations under /data.
connector.name=hive-hadoop2
hive.metastore.uri=thrift://hive-metastore:9083

hive.non-managed-table-writes-enabled=true
hive.allow-drop-table=true
hive.parquet.use-column-names=true

# Presto reads the local filesystem through the hadoop2 connector by default;
# no S3/object-store configuration is required for file:// locations.
