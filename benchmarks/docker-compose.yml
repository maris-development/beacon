# Benchmark environment: Beacon vs PostgreSQL vs Trino vs Presto.
#
# Data strategy: every engine reads the SAME generated Parquet, so the comparison is fair.
# The data lives in the NATIVE Docker volume `benchdata` (ext4 inside the Linux VM), NOT a
# Windows bind mount — bind mounts go through a slow gRPC-FUSE/virtiofs translation layer
# that would dominate I/O-bound reads. Generate to ./data on the host, then copy it into the
# volume once with `sync-data-to-volume.sh` before `docker compose up`.
#   - Beacon  reads /beacon/data/datasets (the volume) natively (parquet + netcdf + zarr).
#   - Postgres has data COPY-loaded into a table by the harness (reads ./data on the host).
#   - Trino & Presto read /benchdata/parquet as Hive EXTERNAL tables over file:// locations
#     via a shared, Derby-backed Hive Metastore (no S3/MinIO needed).
#
# Equal CPU/memory caps are applied to each engine via ENGINE_CPUS / ENGINE_MEM.

x-engine-limits: &engine-limits
  deploy:
    resources:
      limits:
        cpus: "${ENGINE_CPUS:-4}"
        memory: ${ENGINE_MEM:-8g}

services:
  beacon:
    image: ${BEACON_IMAGE:-ghcr.io/maris-development/beacon:latest}
    <<: *engine-limits
    ports:
      - "${BEACON_HOST_PORT:-5001}:5001"
    environment:
      BEACON_ENABLE_SQL: "true"
      BEACON_PORT: "5001"
      BEACON_HOST: "0.0.0.0"
      BEACON_VM_MEMORY_SIZE: "${BEACON_VM_MEMORY_SIZE:-4096}"
      BEACON_WORKER_THREADS: "${BEACON_WORKER_THREADS:-4}"
      BEACON_LOG_LEVEL: "info"
    volumes:
      # Native volume -> /beacon/data/datasets ; beacon scans ./data/datasets from workdir /beacon.
      - benchdata:/beacon/data/datasets
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5001/api/datasets || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16}
    <<: *engine-limits
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bench}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bench}
      POSTGRES_DB: ${POSTGRES_DB:-bench}
    volumes:
      - ./engines/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bench} -d ${POSTGRES_DB:-bench}"]
      interval: 10s
      timeout: 5s
      retries: 12

  # Derby-backed Hive Metastore (embedded DB, ephemeral) shared by Trino & Presto.
  hive-metastore:
    image: ${HIVE_METASTORE_IMAGE:-apache/hive:4.0.0}
    environment:
      SERVICE_NAME: metastore
    ports:
      - "9083:9083"
    volumes:
      # Parquet must be visible to HMS at the same path the catalog locations use.
      # Native volume at /benchdata (NOT /data) to avoid colliding with Trino's node data dir.
      - benchdata:/benchdata:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/9083'"]
      interval: 10s
      timeout: 5s
      retries: 20

  trino:
    image: ${TRINO_IMAGE:-trinodb/trino:457}
    <<: *engine-limits
    ports:
      - "${TRINO_HOST_PORT:-8080}:8080"
    depends_on:
      hive-metastore:
        condition: service_healthy
    volumes:
      - ./engines/trino/catalog/hive.properties:/etc/trino/catalog/hive.properties:ro
      - benchdata:/benchdata:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/v1/info | grep -q '\"starting\":false'"]
      interval: 10s
      timeout: 5s
      retries: 24

  presto:
    image: ${PRESTO_IMAGE:-prestodb/presto:0.289}
    <<: *engine-limits
    ports:
      - "${PRESTO_HOST_PORT:-8090}:8080"
    depends_on:
      hive-metastore:
        condition: service_healthy
    volumes:
      - ./engines/presto/catalog/hive.properties:/opt/presto-server/etc/catalog/hive.properties:ro
      - benchdata:/benchdata:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/v1/info | grep -q '\"starting\":false'"]
      interval: 10s
      timeout: 5s
      retries: 24

  # In-process columnar engine, containerized for an equal comparison: same volume, same
  # CPU/memory cgroup caps. Exposed over a tiny HTTP query server (DuckDB has no native one).
  duckdb:
    image: ${DUCKDB_IMAGE:-python:3.12-slim}
    <<: *engine-limits
    ports:
      - "${DUCKDB_HOST_PORT:-8500}:8500"
    environment:
      DUCKDB_THREADS: "${ENGINE_CPUS:-4}"
      DUCKDB_MEMORY: "${DUCKDB_MEMORY:-8GB}"
      DUCKDB_PORT: "8500"
    volumes:
      - ./engines/duckdb/server.py:/server.py:ro
      - benchdata:/benchdata:ro
    command: ["sh", "-c", "pip install --quiet --no-cache-dir 'duckdb>=1.0' && python /server.py"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8500')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  benchdata:
