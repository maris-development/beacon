[package]
name = "beacon-sql-databases"
version = "0.1.0"
edition = "2021"

[features]
# Each engine is opt-in. An engine feature turns on the matching
# `<engine>-federation` feature in datafusion-table-providers so scans push
# filters/projections/aggregations down to the source database.
default = ["postgres", "mysql"]
postgres = ["datafusion-table-providers/postgres-federation"]
mysql = ["datafusion-table-providers/mysql-federation"]

[dependencies]
beacon-config = { path = "../beacon-config" }
beacon-datafusion-ext = { path = "../beacon-datafusion-ext" }

datafusion = { workspace = true }
datafusion-federation = { workspace = true }
datafusion-table-providers = { workspace = true }
arrow = { workspace = true }

async-trait = { workspace = true }
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
typetag = { workspace = true }
secrecy = {workspace = true}
# XChaCha20-Poly1305 AEAD for encrypting persisted DB credentials at rest.
# `getrandom` (default) provides OsRng for nonce generation.
chacha20poly1305 = {workspace = true}
base64 = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
